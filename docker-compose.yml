name: cursos-api

# Variaveis de ambiente compartilhadas entre o app e o servico de migracao.
x-app-env: &app-env
  NODE_ENV: production
  PORT: 3000
  DB_HOST: postgres
  DB_PORT: 5432
  DB_NAME: ${DB_NAME:-cursos_db}
  DB_USER: ${DB_USER:-cursos_user}
  DB_PASSWORD: ${DB_PASSWORD:-cursos_pass}
  JWT_SECRET: ${JWT_SECRET:-}
  JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1d}
  REDIS_HOST: redis
  REDIS_PORT: 6379

services:
  nginx:
    build:
      context: ./nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      app:
        condition: service_healthy
    networks:
      - cursos_public
      - cursos_internal

  # roda uma vez (migrate + seed inicial + gera o segredo do jwt) e encerra
  migrate:
    build:
      context: ./app
      dockerfile: Dockerfile
    environment: *app-env
    command: ["sh", "-c", "for i in 1 2 3 4 5; do node command.js migrate && node command.js seed:if-empty && node command.js ensure-secret && exit 0; echo \"migrate tentativa $$i falhou, retry em 3s\"; sleep 3; done; echo 'migrate falhou apos 5 tentativas'; exit 1"]
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - app_secrets:/app/.secrets
    networks:
      - cursos_internal
    restart: "no"

  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    restart: unless-stopped
    environment: *app-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - app_secrets:/app/.secrets
    networks:
      - cursos_internal

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-cursos_db}
      POSTGRES_USER: ${DB_USER:-cursos_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-cursos_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-cursos_user} -d ${DB_NAME:-cursos_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cursos_internal

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cursos_internal

networks:
  cursos_public:
    driver: bridge
    name: cursos_public
  cursos_internal:
    driver: bridge
    name: cursos_internal

volumes:
  postgres_data:
    name: cursos_postgres_data
  redis_data:
    name: cursos_redis_data
  app_secrets:
    name: cursos_app_secrets
