name: cursos-api

services:
  nginx:
    image: nginx:1.27-alpine
    container_name: cursos_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - cursos_public
      - cursos_internal

  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: cursos_app
    restart: unless-stopped
    env_file:
      - ./app/.env
    environment:
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cursos_internal

  postgres:
    image: postgres:17-alpine
    container_name: cursos_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-cursos_db}
      POSTGRES_USER: ${DB_USER:-cursos_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-cursos_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-cursos_user} -d ${DB_NAME:-cursos_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cursos_internal

  redis:
    image: redis:7-alpine
    container_name: cursos_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cursos_internal

networks:
  cursos_public:
    driver: bridge
    name: cursos_public
  cursos_internal:
    driver: bridge
    name: cursos_internal

volumes:
  postgres_data:
    name: cursos_postgres_data
  redis_data:
    name: cursos_redis_data
